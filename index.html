<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de monstre</title>
    <link rel="stylesheet" href="css/messtyles.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0&" />
    <script src="script.js" defer></script>
</head>

<body>
    <section class="gen">
        <div class="wrapper">
            <h1>Générateur de monstre</h1>
            <div class="caroussel">
                <div class="gauche">
                    <span class="material-symbols-outlined corps-gauche">
                        arrow_back_2
                    </span>
                    <span class="material-symbols-outlined yeux-gauche">
                        arrow_back_2
                    </span>
                    <span class="material-symbols-outlined bouche-gauche">
                        arrow_back_2
                    </span>
                    <span class="material-symbols-outlined background-gauche">
                        arrow_back_2
                    </span>

                </div>
                <div class="monstre">
                    <img src="" alt="" class="corps">
                    <img src="" alt="" class="yeux">
                    <img src="" alt="" class="bouche">
                </div>

                <div class="droite"><span class="material-symbols-outlined corps-droit">
                        play_arrow
                    </span>
                    <span class="material-symbols-outlined yeux-droit">
                        play_arrow
                    </span>
                    <span class="material-symbols-outlined bouche-droit">
                        play_arrow
                    </span>
                    <span class="material-symbols-outlined background-droit">
                        play_arrow
                    </span>
                </div>
            </div>

            <button class="button">Génère un monstre
            </button>
        </div>
    </section>

</body>

</html>
